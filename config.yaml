intelligence:
  scan_world_events: true
  second_order_analysis: true
  auto_detect_themes: true
  causal_depth: 4             # how many layers deep to trace causes

screening:
  universe: "GLOBAL"          # GLOBAL or US-only
  regions:                    # comment out any region to exclude it
    - US
    - JAPAN
    - KOREA
    - TAIWAN
    - CHINA
    - INDIA
    - AUSTRALIA
    - UK
    - GERMANY
    - FRANCE
    - NETHERLANDS
    - SWITZERLAND
    - SPAIN
    - CANADA
    - BRAZIL
    - DENMARK
  max_candidates: 80          # stocks passing Stage 1 screener (more universe = higher cap)
  max_deep_analyse: 20        # stocks getting full 4-agent treatment
  min_market_cap_m: 500       # minimum market cap in millions (USD equivalent)
  min_avg_volume: 500000      # minimum average daily volume (halved for non-US automatically)

horizons:
  quarter:   5                # top N picks per horizon
  one_year:  5
  two_year:  5
  five_year: 5
  ten_year:  5

models:
  # Inference profile ARNs (required for on-demand invocation on Bedrock)
  orchestrator:  "arn:aws:bedrock:us-east-1:597864876332:application-inference-profile/j0088oxmdngr"
  world:         "arn:aws:bedrock:us-east-1:597864876332:application-inference-profile/j0088oxmdngr"
  causal:        "arn:aws:bedrock:us-east-1:597864876332:application-inference-profile/j0088oxmdngr"
  screener:      "arn:aws:bedrock:us-east-1:597864876332:application-inference-profile/mxh86uu7v257"
  market:        "arn:aws:bedrock:us-east-1:597864876332:application-inference-profile/mxh86uu7v257"
  news:          "arn:aws:bedrock:us-east-1:597864876332:application-inference-profile/mxh86uu7v257"
  fundamentals:  "arn:aws:bedrock:us-east-1:597864876332:application-inference-profile/j0088oxmdngr"
  geo:           "arn:aws:bedrock:us-east-1:597864876332:application-inference-profile/mxh86uu7v257"
  ranking:       "arn:aws:bedrock:us-east-1:597864876332:application-inference-profile/j0088oxmdngr"

schedule:
  run_at: "06:30"             # HH:MM — before US market open 09:30 ET
  timezone: "US/Eastern"
  weekdays_only: true

delivery:
  method: email               # email | slack | terminal
